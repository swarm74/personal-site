<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Downloader</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 8px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #e62117; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YouTube to MP4</h2>
        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="Paste YouTube link here..." required>
            <button type="submit">Download</button>
        </form>
        <p><small>For personal use cuz other downloaders suck</small></p>
    </div>
</body>
</html>
