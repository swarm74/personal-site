<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>glaiveOS V1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-grey: #888888;
            --c-discord: #5865F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background: var(--bg-black); 
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-white); 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vignette { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1; 
            pointer-events: none; 
        }

        .center-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            letter-spacing: -1px;
            text-transform: lowercase;
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-grey);
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .download-status {
            font-size: 0.8rem;
            color: var(--c-discord);
            text-decoration: none;
            border: 1px solid #222;
            padding: 10px 20px;
            border-radius: 30px;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        .download-status:hover {
            background: white;
            color: black;
            border-color: white;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="center-container">
        <h1 class="main-title">glaive.lol</h1>
        <p class="subtitle">v1 download started</p>
        
        <a href="https://cdn.discordapp.com/attachments/1474983134494720152/1475746246676451360/glaive_v1.apbx?ex=699e9b4b&is=699d49cb&hm=b2a29d33968cf9c13f294e91209d6af9768b805912b5f5005248aa5eebd09a14&">
            Click here if download doesn't start
        </a>
    </div>

    <script>
        // Replace this with your actual Discord file link
        const downloadUrl = "https://cdn.discordapp.com/attachments/1474983134494720152/1475746246676451360/glaive_v1.apbx?ex=699e9b4b&is=699d49cb&hm=b2a29d33968cf9c13f294e91209d6af9768b805912b5f5005248aa5eebd09a14&";
        // Trigger download immediately on load
        window.onload = () => {
            window.location.href = downloadUrl;
        };
    </script>
</body>

</html>
